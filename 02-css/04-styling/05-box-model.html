<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
        }
        h1 { color: #f5576c; text-align: center; margin-bottom: 40px; font-size: 2.5em; }
        h2 { color: #f093fb; border-bottom: 3px solid #f5576c; padding-bottom: 10px; margin: 30px 0 20px; }
        section { margin-bottom: 40px; }
        .demo { background: #f9fafb; padding: 30px; border-radius: 10px; margin: 20px 0; }
        code { background: #f3f4f6; padding: 2px 8px; border-radius: 4px; color: #d63384; font-family: monospace; }
        pre { background: #1f2937; color: #f9fafb; padding: 20px; border-radius: 8px; margin: 15px 0; }
        pre code { background: transparent; color: inherit; }
        .info-box { background: #fef5fb; border-left: 4px solid #f5576c; padding: 20px; margin: 20px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CSS Box Model</h1>
        <section>
            <h2>Overview</h2>
            <div class="info-box">
                <p>Comprehensive guide to CSS Box Model.</p>
            </div>
        </section>
        <section>
            <h2>Examples</h2>
            <div class="demo">
                <p>Demo content for Box Model</p>
            </div>
        </section>
        <section>
            <h2>Best Practices</h2>
            <div class="info-box">
                <ul>
                    <li>Use semantic HTML</li>
                    <li>Follow accessibility guidelines</li>
                    <li>Test across browsers</li>
                </ul>
            </div>
        </section>
    </div>
</body>
</html>
